<mat-card class="product-card">
  <div class="product-wrapper" [ngClass]="{ 'col-mode': !fullWidthMode, 'row-mode': fullWidthMode }">
    
    <!-- Image wrapper -->
    <div class="image-container" 
         [ngClass]="{ 'col-mode': !fullWidthMode, 'row-mode': fullWidthMode }">
      <img
        [src]="product?.image"
        [alt]="product?.title"
        class="product-image"
        [ngClass]="{ 'col-mode': !fullWidthMode, 'row-mode': fullWidthMode }"
      />
    </div>

    <!-- Product Details -->
    <div class="product-details" [ngClass]="{ 'col-mode': !fullWidthMode }">
      <div>
        <p class="product-category">{{ product?.category }}</p>
        <h3 class="product-title" 
            [ngClass]="{ 'truncate': !fullWidthMode }">
          {{ product?.title }}
        </h3>
        <p *ngIf="fullWidthMode" class="product-desc">
          {{ product?.description }}
        </p>
      </div>

      <!-- Price & Actions -->
      <div class="product-footer">
        <span class="product-price">{{ product?.price | currency }}</span>
        
        <button mat-mini-fab color="primary" (click)="onAddToCart()">
          <mat-icon>shopping_cart</mat-icon>
        </button>
      </div>
    </div>

  </div>
</mat-card>
